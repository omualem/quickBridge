# --- LAN hosting -----------------------------------------------------------
# Bind to all interfaces so other devices on the same Wi-Fi/LAN can reach this
# host computer (not just localhost). Override with --server.address if needed.
server.address=0.0.0.0
server.port=8080

# --- QuickBridge settings --------------------------------------------------
quickbridge.host.port=8080
quickbridge.storage.dir=${user.home}/.quickbridge/sessions
quickbridge.session.ttl-minutes=30
# 10GB per-file ceiling, and no file-count limit (0 = unlimited) — files live on
# the host computer's own disk, so the only real constraint is free disk space.
quickbridge.file.max-size-mb=10240
quickbridge.file.max-files-per-session=0
quickbridge.cleanup.fixed-rate-ms=60000
# Open the local UI in the default browser on startup. Off by default. The
# packaged desktop EXE prefers the desktop window's "Open in browser" button.
# Ignored on headless/CI/test runs.
quickbridge.browser.open-on-start=false
# Show the small Swing status/control window. Off by default so server/CI/headless
# runs and tests never open a window; the jpackage launcher passes =true.
quickbridge.desktop.enabled=false

# --- Multipart uploads -----------------------------------------------------
# Kept in step with quickbridge.file.max-size-mb (10GB). file-size-threshold=0
# forces Spring to spool uploads to a temp file on disk instead of buffering them
# in memory, so large files never sit in the heap.
spring.servlet.multipart.max-file-size=10240MB
spring.servlet.multipart.max-request-size=10240MB
spring.servlet.multipart.file-size-threshold=0

# Keep startup logs readable.
spring.application.name=quickbridge
